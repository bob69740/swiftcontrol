# Build Windows exe only — build release, bundle DLLs, upload artifact
name: "Build Windows EXE"

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.38.4

jobs:
  build-windows:
    name: Build & Package Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Extract version from pubspec.yaml
        shell: pwsh
        run: |
          # Vérifier que le fichier existe
          if (-not (Test-Path pubspec.yaml)) {
            Write-Error "pubspec.yaml introuvable dans le répertoire racine. Vérifie le chemin ou déplace le workflow."
            exit 1
          }

          # Lire tout le fichier et chercher la clé version: en mode multi-ligne
          $content = Get-Content pubspec.yaml -Raw
          $m = [regex]::Match($content, '^\s*version\s*:\s*("?)(?<v>[^"\r\n]+)\1', [System.Text.RegularExpressions.RegexOptions]::Multiline)

          if (-not $m.Success) {
            Write-Error "Impossible de trouver la ligne 'version:' dans pubspec.yaml. Format attendu : version: 1.2.3+4 (avec ou sans guillemets)."
            exit 1
          }

          $version = $m.Groups['v'].Value.Trim()
          Write-Host "Version trouvée: $version"
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$version"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Flutter pub get
        shell: pwsh
        run: |
          flutter pub get

      - name: Build Windows (release)
        shell: pwsh
        run: |
          flutter build windows --release

      - name: Bundle DLLs and create zip
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "build\windows\x64\runner\Release"
          if (-not (Test-Path $releaseDir)) {
            Write-Error "Répertoire de build introuvable: $releaseDir"
            exit 1
          }
          # DLLs nécessaires (ajoute ou retire si besoin)
          $dlls = @("msvcp140.dll","vcruntime140.dll","vcruntime140_1.dll")
          $systemDir = Join-Path $env:windir "System32"
          foreach ($dll in $dlls) {
            $src = Join-Path $systemDir $dll
            $dest = Join-Path $releaseDir $dll
            if (Test-Path $src) {
              Copy-Item -Path $src -Destination $dest -Force
              Write-Host "Copied $dll"
            } else {
              Write-Warning "$dll introuvable dans $systemDir — vérifie si nécessaire"
            }
          }
          # create zip named with version
          if (-not $env:VERSION) {
            Write-Error "VERSION non défini. L'étape d'extraction de version a échoué ou n'a pas été exécutée."
            exit 1
          }
          $zipName = "bike_control.windows.$($env:VERSION).zip"
          $zipPath = Join-Path $releaseDir $zipName
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          # Compress all files in the release directory into the zip
          Compress-Archive -Path (Join-Path $releaseDir "*") -DestinationPath $zipPath -Force
          Write-Host "Created zip: $zipPath"

      - name: List packaged files (debug)
        shell: pwsh
        run: |
          Get-ChildItem -Path build\windows\x64\runner\Release | Select-Object Name,Length

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: bike_control-windows-${{ env.VERSION }}
          path: build/windows/x64/runner/Release/bike_control.windows.${{ env.VERSION }}.zip
