name: "Build Web"

on:
  push:
    branches:
      - web
      - wahoo_kickr_bike_shift
      - main
    paths:
      - '.github/workflows/web.yml'
      - 'lib/**'
      - 'accessibility/**'
      - 'keypress_simulator/**'
      - 'pubspec.yaml'

jobs:
  build:
    name: Build Web
    runs-on: macos-latest

    permissions:
      id-token: write
      pages: write
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate translation files
        run: |
          flutter pub global activate intl_utils;
          flutter pub global run intl_utils:generate;

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/swiftcontrol/"

      - name: Pré‑nettoyage automatique : remplacer symlinks & casser hard links
        # utilise bash + python pour être portable et sûr sur macOS runner
        run: |
          set -euxo
