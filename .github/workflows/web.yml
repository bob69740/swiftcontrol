name: "Build Web"

on:
  push:
    branches:
      - web
      - wahoo_kickr_bike_shift
      - main
    paths:
      - '.github/workflows/web.yml'
      - 'lib/**'
      - 'accessibility/**'
      - 'keypress_simulator/**'
      - 'pubspec.yaml'

jobs:
  build:
    name: Build Web
    runs-on: macos-latest

    permissions:
      id-token: write
      pages: write
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate translation files
        run: |
          flutter pub global activate intl_utils
          flutter pub global run intl_utils:generate

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/swiftcontrol/"

      - name: Pre-clean: replace symlinks and break hard links
        run: |
          set -euo pipefail

          if [ ! -d build/web ]; then
            echo "ERROR: build/web not found. Did the build succeed?"
            exit 1
          fi

          echo "Size before cleanup:"
          du -sh build/web || true

          echo "Top 30 files by size (before cleanup):"
          du -ah build/web 2>/dev/null | sort -rh | head -n 30 || true

          echo "Replacing symlinks with copies (or removing if target missing)..."
          # Find symlinks and process them
          find build/web -type l -print0 | while IFS= read -r -d '' f; do
            target="$(readlink "$f")"
            echo "Symlink found: $f -> $target"
            # Try to resolve relative targets
            if [ ! -e "$target" ]; then
              target_abs="$(realpath -m "$(dirname "$f")/$target" 2>/dev/null || true)"
              if [ -n "$target_abs" ] && [ -e "$target_abs" ]; then
                target="$target_abs"
              fi
            fi
            if [ -e "$target" ]; then
              rm -f "$f" || true
              if [ -d "$target" ]; then
                mkdir -p "$f"
                cp -a "$target/." "$f/"
                echo "Replaced symlink directory $f with copy of $target"
              else
                mkdir -p "$(dirname "$f")"
                cp -a "$target" "$f"
                echo "Replaced symlink file $f with copy of $target"
              fi
            else
              echo "TARGET MISSING for symlink: $f -> $target. Removing symlink."
              rm -f "$f" || true
            fi
          done

          echo "Breaking hard links (files with nlink > 1)..."
          find build/web -type f -links +1 -print0 | while IFS= read -r -d '' f; do
            echo "Breaking hard link for: $f"
            tmp="${f}.tmp.$$"
            cp -p "$f" "$tmp" && mv -f "$tmp" "$f"
          done

          echo "Removing unwanted files (.DS_Store)..."
          find build/web -name '.DS_Store' -delete || true

          echo "Verification after cleanup..."
          du -sh build/web || true
          echo "Top 30 files by size (after cleanup):"
          du -ah build/web 2>/dev/null | sort -rh | head -n 30 || true

          # Verify total size < 10 GB
          size_kb=$(du -sk build/web | cut -f1 || echo 0)
          size_bytes=$((size_kb * 1024))
          echo "Total size (bytes): $size_bytes"
          max_bytes=$((10 * 1024 * 1024 * 1024))
          if [ "$size_bytes" -ge "$max_bytes" ]; then
            echo "ERROR: build/web size >= 10GB ($size_bytes bytes). Reduce size before deploy."
            exit 1
          fi

      - name: Upload static files as artifact (unique name)
        uses: actions/upload-artifact@v4
        with:
          name: github-pages-web
          path: build/web

      - name: List artifacts for this run (debug)
        run: |
          echo "Listing artifacts for run $GITHUB_RUN_ID"
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Web Deploy
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-web
