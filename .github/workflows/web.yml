name: "Build Web"

on:
  push:
    branches:
      - web
      - wahoo_kickr_bike_shift
      - main
    paths:
      - '.github/workflows/web.yml'
      - 'lib/**'
      - 'accessibility/**'
      - 'keypress_simulator/**'
      - 'pubspec.yaml'

jobs:
  build:
    name: Build Web
    runs-on: macos-latest

    permissions:
      id-token: write
      pages: write
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate translation files
        run: |
          flutter pub global activate intl_utils;
          flutter pub global run intl_utils:generate;

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/swiftcontrol/"

      # Upload the built site as an artifact with a unique name
      - name: Upload static files as artifact (unique name)
        uses: actions/upload-artifact@v4
        with:
          name: github-pages-web
          path: build/web

      # Optional debug step: list artifacts for this run (helps diagnosing duplicates)
      - name: List artifacts for this run (debug)
        run: |
          echo "Listing artifacts for run $GITHUB_RUN_ID"
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            | jq ".artifacts[] | {id: .id, name: .name}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Deploy the specific artifact to GitHub Pages
      - name: Web Deploy
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-web
