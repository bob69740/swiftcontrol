name: "Build Web"

on:
  push:
    branches:
      - web
      - wahoo_kickr_bike_shift
      - main
    paths:
      - '.github/workflows/web.yml'
      - 'lib/**'
      - 'accessibility/**'
      - 'keypress_simulator/**'
      - 'pubspec.yaml'

jobs:
  build:
    name: Build Web
    runs-on: macos-latest

    permissions:
      id-token: write
      pages: write
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate translation files
        run: |
          flutter pub global activate intl_utils;
          flutter pub global run intl_utils:generate;

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/swiftcontrol/"

      - name: Pré‑nettoyage automatique : remplacer symlinks & casser hard links
        # utilise bash + python pour être portable et sûr sur macOS runner
        run: |
          set -euxo pipefail

          if [ ! -d build/web ]; then
            echo "ERREUR: build/web introuvable. Le build a-t-il réussi ?"
            exit 1
          fi

          echo "Taille avant nettoyage:"
          du -sh build/web || true

          echo "Top 30 des fichiers par taille (avant nettoyage):"
          du -ah build/web 2>/dev/null | sort -rh | head -n 30 || true

          echo "Remplacement automatique des symlinks par des copies et cassage des hard links..."
          python3 - <<'PY'
import os, shutil
root = 'build/web'
if not os.path.isdir(root):
    print("build/web absent, sortie.")
    raise SystemExit(1)

for dirpath, dirnames, filenames in os.walk(root):
    # traiter d'abord les fichiers puis les dossiers
    for name in filenames + dirnames:
        path = os.path.join(dirpath, name)
        try:
            # symlink ?
            if os.path.islink(path):
                target = os.path.realpath(path)
                if not os.path.exists(target):
                    print("CIBLE INTRouvable pour symlink:", path, "->", target)
                    # on supprime le symlink cassé pour éviter problème lors du deploy
                    os.remove(path)
                    print("Suppression du symlink cassé:", path)
                    continue
                # supprimer le symlink avant de copier
                try:
                    os.remove(path)
                except Exception as e:
                    print("Impossible de supprimer le symlink", path, e)
                if os.path.isdir(target):
                    # copytree la cible DANS le chemin du symlink
                    shutil.copytree(target, path, dirs_exist_ok=True)
                else:
                    # copier le fichier
                    shutil.copy2(target, path)
                print("Remplacé symlink", path, "par copie de", target)
                continue

            # hard link ? (nlinks > 1)
            try:
                st = os.lstat(path)
                nlinks = st.st_nlink
            except Exception:
                nlinks = 1
            if nlinks > 1 and os.path.isfile(path):
                # read/write to break hard link
                with open(path, 'rb') as f:
                    data = f.read()
                with open(path, 'wb') as f:
                    f.write(data)
                print("Cassé hard link pour:", path)
        except Exception as e:
            print("Erreur sur", path, ":", e)
PY

          echo "Suppression des fichiers indésirables (.DS_Store)..."
          find build/web -name '.DS_Store' -delete || true

          echo "Vérification après nettoyage..."
          du -sh build/web || true
          echo "Top 30 des fichiers par taille (après nettoyage):"
          du -ah build/web 2>/dev/null | sort -rh | head -n 30 || true

          # Vérifier taille totale < 10 GB
          MAX_BYTES=$((10 * 1024 * 1024 * 1024))
          SIZE_BYTES=$(du -sb build/web | cut -f1 || echo 0)
          echo "Taille totale (bytes): $SIZE_BYTES"
          if [ "$SIZE_BYTES" -ge "$MAX_BYTES" ]; then
            echo "ERREUR: taille de build/web >= 10GB ($SIZE_BYTES bytes). Réduis la taille avant deploy."
            exit 1
          fi

      - name: Upload static files as artifact (unique name)
        uses: actions/upload-artifact@v4
        with:
          name: github-pages-web
          path: build/web

      - name: List artifacts for this run (debug)
        run: |
          echo "Listing artifacts for run $GITHUB_RUN_ID"
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            | jq ".artifacts[] | {id: .id, name: .name}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Web Deploy
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-web
